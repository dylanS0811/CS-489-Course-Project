spring.application.name=dental-surgery-appointment
spring.main.banner-mode=off
logging.level.root=warn
logging.level.edu.miu.cs.cs489.courseproject=info

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:mem:dental_surgery_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:CS489CourseProjectDentalSurgeryAppointmentJwtSecretKey2026Final}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.seed.enabled=${SEED_ENABLED:true}
