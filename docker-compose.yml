services:
  mysql:
    image: mysql:8.4
    container_name: cs489-course-project-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: dental_surgery_db
    ports:
      - "3307:3306"
    volumes:
      - dental-surgery-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  dental-surgery-app:
    build:
      context: .
    image: dental-surgery-appointment:course-project
    container_name: cs489-course-project-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/dental_surgery_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Chicago
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USERNAME: root
      DB_PASSWORD: 123456
      DDL_AUTO: update
      SEED_ENABLED: "true"
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0
    ports:
      - "8080:8080"

volumes:
  dental-surgery-mysql-data:
